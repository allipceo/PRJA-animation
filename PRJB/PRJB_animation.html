<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Digital Trust</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .scene {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }

  .scene.active {
    opacity: 1;
  }

  .scene-bg {
    width: 100%;
    height: 90vh;
    object-fit: contain;
    display: block;
    margin: auto;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  #progress-bar-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.15);
    z-index: 100;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #0072ff, #00b8ff);
    transition: width 0.25s linear;
  }

  #scene-counter {
    position: fixed;
    top: 20px;
    right: 28px;
    color: rgba(255,255,255,0.45);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="stage">
  <div class="scene" id="scene-1"><img class="scene-bg" src="slide_01.jpg" alt=""></div>
  <div class="scene" id="scene-2"><img class="scene-bg" src="slide_02.jpg" alt=""></div>
  <div class="scene" id="scene-3"><img class="scene-bg" src="slide_03.jpg" alt=""></div>
  <div class="scene" id="scene-4"><img class="scene-bg" src="slide_04.jpg" alt=""></div>
  <div class="scene" id="scene-5"><img class="scene-bg" src="slide_05.jpg" alt=""></div>
  <div class="scene" id="scene-6"><img class="scene-bg" src="slide_06.jpg" alt=""></div>
  <div class="scene" id="scene-7"><img class="scene-bg" src="slide_07.jpg" alt=""></div>
  <div class="scene" id="scene-8"><img class="scene-bg" src="slide_08.jpg" alt=""></div>
  <div class="scene" id="scene-9"><img class="scene-bg" src="slide_09.jpg" alt=""></div>
  <div class="scene" id="scene-10"><img class="scene-bg" src="slide_10.jpg" alt=""></div>
  <div class="scene" id="scene-11"><img class="scene-bg" src="slide_11.jpg" alt=""></div>
  <div class="scene" id="scene-12"><img class="scene-bg" src="slide_12.jpg" alt=""></div>
  <div class="scene" id="scene-13"><img class="scene-bg" src="slide_13.jpg" alt=""></div>
</div>

<div id="progress-bar-wrap">
  <div id="progress-bar"></div>
</div>

<div id="scene-counter">1 / 13</div>

<script>
  const SCENES = Array.from({length: 13}, (_, i) => ({
    id: `scene-${i+1}`,
    duration: 10000
  }));

  const TOTAL_MS = SCENES.length * 10000;

  const progressBar = document.getElementById('progress-bar');
  const sceneCounter = document.getElementById('scene-counter');

  let currentIndex = 0;
  let startTime = null;
  let sceneStart = 0;

  function showScene(index) {
    SCENES.forEach((sc, i) => {
      document.getElementById(sc.id).classList.toggle('active', i === index);
    });
    sceneCounter.textContent = `${index + 1} / ${SCENES.length}`;
  }

  function tick(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;

    progressBar.style.width = Math.min(elapsed / TOTAL_MS * 100, 100) + '%';

    if (elapsed - sceneStart >= SCENES[currentIndex].duration) {
      if (currentIndex < SCENES.length - 1) {
        currentIndex++;
        sceneStart = elapsed;
        showScene(currentIndex);
      } else {
        progressBar.style.width = '100%';
        return;
      }
    }

    requestAnimationFrame(tick);
  }

  showScene(0);
  requestAnimationFrame(tick);
</script>
</body>
</html>
