<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Digital Trust</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .scene {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
    pointer-events: none;
  }

  .scene.active {
    opacity: 1;
    pointer-events: auto;
  }

  .scene-bg {
    width: 100%;
    height: 90vh;
    object-fit: contain;
    display: block;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* 진행 바 */
  #progress-bar-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.15);
    z-index: 100;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #0072ff, #00b8ff);
    transition: width 0.3s ease;
  }

  /* 씬 번호 */
  #scene-counter {
    position: fixed;
    top: 20px;
    right: 28px;
    color: rgba(255,255,255,0.45);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    z-index: 100;
  }

  /* 네비게이션 버튼 */
  .nav-btn {
    position: fixed;
    bottom: 32px;
    z-index: 200;
    background: rgba(0, 0, 0, 0.5);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-btn:hover {
    background: rgba(0, 114, 255, 0.6);
    border-color: #00b8ff;
    transform: scale(1.1);
  }

  .nav-btn:active {
    transform: scale(0.95);
  }

  .nav-btn.disabled {
    opacity: 0.25;
    cursor: default;
    pointer-events: none;
  }

  #btn-prev { left: 32px; }
  #btn-next { right: 32px; }

  .nav-btn svg {
    width: 24px;
    height: 24px;
    fill: none;
    stroke: #fff;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>

<div id="stage">
  <div class="scene" id="scene-1"><img class="scene-bg" src="slide_01.jpg" alt=""></div>
  <div class="scene" id="scene-2"><img class="scene-bg" src="slide_02.jpg" alt=""></div>
  <div class="scene" id="scene-3"><img class="scene-bg" src="slide_03.jpg" alt=""></div>
  <div class="scene" id="scene-4"><img class="scene-bg" src="slide_04.jpg" alt=""></div>
  <div class="scene" id="scene-5"><img class="scene-bg" src="slide_05.jpg" alt=""></div>
  <div class="scene" id="scene-6"><img class="scene-bg" src="slide_06.jpg" alt=""></div>
  <div class="scene" id="scene-7"><img class="scene-bg" src="slide_07.jpg" alt=""></div>
  <div class="scene" id="scene-8"><img class="scene-bg" src="slide_08.jpg" alt=""></div>
  <div class="scene" id="scene-9"><img class="scene-bg" src="slide_09.jpg" alt=""></div>
  <div class="scene" id="scene-10"><img class="scene-bg" src="slide_10.jpg" alt=""></div>
  <div class="scene" id="scene-11"><img class="scene-bg" src="slide_11.jpg" alt=""></div>
  <div class="scene" id="scene-12"><img class="scene-bg" src="slide_12.jpg" alt=""></div>
  <div class="scene" id="scene-13"><img class="scene-bg" src="slide_13.jpg" alt=""></div>
</div>

<div id="progress-bar-wrap">
  <div id="progress-bar"></div>
</div>

<div id="scene-counter">1 / 13</div>

<!-- 이전 버튼 -->
<button class="nav-btn disabled" id="btn-prev" aria-label="이전">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</button>

<!-- 다음 버튼 -->
<button class="nav-btn" id="btn-next" aria-label="다음">
  <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
</button>

<script>
  const TOTAL = 13;
  let current = 0;

  const progressBar = document.getElementById('progress-bar');
  const sceneCounter = document.getElementById('scene-counter');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');

  function showScene(index) {
    document.querySelectorAll('.scene').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });
    sceneCounter.textContent = `${index + 1} / ${TOTAL}`;
    progressBar.style.width = ((index + 1) / TOTAL * 100) + '%';
    btnPrev.classList.toggle('disabled', index === 0);
    btnNext.classList.toggle('disabled', index === TOTAL - 1);
  }

  btnPrev.addEventListener('click', () => {
    if (current > 0) { current--; showScene(current); }
  });

  btnNext.addEventListener('click', () => {
    if (current < TOTAL - 1) { current++; showScene(current); }
  });

  // 키보드 지원
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      if (current < TOTAL - 1) { current++; showScene(current); }
    }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      if (current > 0) { current--; showScene(current); }
    }
  });

  showScene(0);
</script>
</body>
</html>
