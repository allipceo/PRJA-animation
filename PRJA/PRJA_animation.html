<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-SCool — 디지털 블랙박스</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  }

  #stage {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .scene {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }

  .scene.active {
    opacity: 1;
  }

  .scene-bg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* 진행 바 */
  #progress-bar-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.15);
    z-index: 100;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #0072ff, #00b8ff);
    transition: width 0.25s linear;
  }

  /* 씬 번호 표시 */
  #scene-counter {
    position: fixed;
    top: 20px;
    right: 28px;
    color: rgba(255,255,255,0.45);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="stage">

  <div class="scene" id="scene-1"><img class="scene-bg" src="slide_01.jpg" alt=""></div>
  <div class="scene" id="scene-2"><img class="scene-bg" src="slide_02.jpg" alt=""></div>
  <div class="scene" id="scene-3"><img class="scene-bg" src="slide_03.jpg" alt=""></div>
  <div class="scene" id="scene-4"><img class="scene-bg" src="slide_04.jpg" alt=""></div>
  <div class="scene" id="scene-5"><img class="scene-bg" src="slide_05.jpg" alt=""></div>
  <div class="scene" id="scene-6"><img class="scene-bg" src="slide_06.jpg" alt=""></div>
  <div class="scene" id="scene-7"><img class="scene-bg" src="slide_07.jpg" alt=""></div>
  <div class="scene" id="scene-8"><img class="scene-bg" src="slide_08.jpg" alt=""></div>

</div>

<div id="progress-bar-wrap">
  <div id="progress-bar"></div>
</div>

<div id="scene-counter">1 / 8</div>

<script>
  const SCENES = [
    { id: 'scene-1', duration: 12000 },
    { id: 'scene-2', duration: 12000 },
    { id: 'scene-3', duration: 10000 },
    { id: 'scene-4', duration: 10000 },
    { id: 'scene-5', duration: 12000 },
    { id: 'scene-6', duration: 10000 },
    { id: 'scene-7', duration: 12000 },
    { id: 'scene-8', duration: 12000 },
  ];

  const TOTAL_MS = SCENES.reduce((s, sc) => s + sc.duration, 0); // 90000

  const progressBar = document.getElementById('progress-bar');
  const sceneCounter = document.getElementById('scene-counter');

  let currentIndex = 0;
  let startTime = null;
  let sceneStart = 0;
  let rafId = null;

  function getEl(id) { return document.getElementById(id); }

  function showScene(index) {
    SCENES.forEach((sc, i) => {
      getEl(sc.id).classList.toggle('active', i === index);
    });
    sceneCounter.textContent = `${index + 1} / ${SCENES.length}`;
  }

  function tick(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;

    // 진행 바
    const pct = Math.min(elapsed / TOTAL_MS * 100, 100);
    progressBar.style.width = pct + '%';

    // 씬 전환
    const sc = SCENES[currentIndex];
    if (elapsed - sceneStart >= sc.duration) {
      if (currentIndex < SCENES.length - 1) {
        currentIndex++;
        sceneStart = elapsed;
        showScene(currentIndex);
      } else {
        // 마지막 씬: 정지
        progressBar.style.width = '100%';
        return;
      }
    }

    rafId = requestAnimationFrame(tick);
  }

  // 시작
  showScene(0);
  rafId = requestAnimationFrame(tick);
</script>
</body>
</html>
