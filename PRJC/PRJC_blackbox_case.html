<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털 블랙박스의 필요성</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  }

  #stage {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .scene {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
    pointer-events: none;
  }

  .scene.active {
    opacity: 1;
    pointer-events: auto;
  }

  .scene-bg {
    width: 100%;
    height: 90vh;
    object-fit: contain;
    display: block;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* 상단 제목 바 */
  #title-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 12px 28px;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  #deck-title {
    color: rgba(255,255,255,0.9);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #slide-label {
    color: rgba(255,255,255,0.45);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
  }

  /* 슬라이드 요약 패널 */
  #info-panel {
    position: fixed;
    bottom: 52px;
    left: 50%;
    transform: translateX(-50%);
    width: min(640px, 80%);
    background: rgba(0,0,0,0.55);
    border-top: 1px solid rgba(255,255,255,0.12);
    padding: 10px 20px;
    text-align: center;
    z-index: 100;
    border-radius: 6px;
  }

  #slide-topic {
    color: rgba(255,255,255,0.8);
    font-size: 0.82rem;
    letter-spacing: -0.01em;
  }

  /* 진행 바 */
  #progress-bar-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    z-index: 100;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #0072ff, #00b8ff);
    transition: width 0.3s ease;
  }

  /* 씬 번호 */
  #scene-counter {
    position: fixed;
    top: 14px;
    right: 28px;
    color: rgba(255,255,255,0.4);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    z-index: 101;
  }

  /* 네비게이션 버튼 */
  .nav-btn {
    position: fixed;
    bottom: 28px;
    z-index: 200;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-btn:hover {
    background: rgba(0,114,255,0.55);
    border-color: #00b8ff;
    transform: scale(1.1);
  }

  .nav-btn:active { transform: scale(0.95); }

  .nav-btn.disabled {
    opacity: 0.2;
    cursor: default;
    pointer-events: none;
  }

  #btn-prev { left: 28px; }
  #btn-next { right: 28px; }

  .nav-btn svg {
    width: 22px;
    height: 22px;
    fill: none;
    stroke: #fff;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>

<div id="stage">
  <div class="scene" id="scene-0"><img class="scene-bg" src="A1.jpg" alt=""></div>
  <div class="scene" id="scene-1"><img class="scene-bg" src="A2.jpg" alt=""></div>
  <div class="scene" id="scene-2"><img class="scene-bg" src="B4.jpg" alt=""></div>
  <div class="scene" id="scene-3"><img class="scene-bg" src="B5.jpg" alt=""></div>
  <div class="scene" id="scene-4"><img class="scene-bg" src="B3.jpg" alt=""></div>
  <div class="scene" id="scene-5"><img class="scene-bg" src="A3.jpg" alt=""></div>
</div>

<div id="title-bar">
  <span id="deck-title">디지털 블랙박스의 필요성</span>
  <span id="slide-label"></span>
</div>

<div id="scene-counter">1 / 6</div>

<div id="info-panel">
  <p id="slide-topic"></p>
</div>

<div id="progress-bar-wrap">
  <div id="progress-bar"></div>
</div>

<button class="nav-btn disabled" id="btn-prev" aria-label="이전">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</button>
<button class="nav-btn" id="btn-next" aria-label="다음">
  <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
</button>

<script>
  const SLIDES = [
    { id: 'scene-0', topic: '피지컬 월드 — 블랙박스가 보험금을 만든다', label: 'A1 · 문제제기' },
    { id: 'scene-1', topic: '디지털 월드 — 블랙박스가 없어서 보험이 없다', label: 'A2 · 문제제기' },
    { id: 'scene-2', topic: '왜 판명이 안 되나 — 해킹·오류·사기의 구분 불가', label: 'B4 · 구조분석' },
    { id: 'scene-3', topic: '기존 보험이 왜 거절하나 — 4대 면책 구조', label: 'B5 · 보험한계' },
    { id: 'scene-4', topic: '실제 사례 — 빗썸 62조 Ghost Coin 사건', label: 'B3 · 사례증거' },
    { id: 'scene-5', topic: '결론 — 디지털 블랙박스 K-SCool의 등장', label: 'A3 · 솔루션' },
  ];

  const TOTAL = SLIDES.length;
  let current = 0;

  const progressBar = document.getElementById('progress-bar');
  const sceneCounter = document.getElementById('scene-counter');
  const slideLabel  = document.getElementById('slide-label');
  const slideTopic  = document.getElementById('slide-topic');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');

  function showScene(index) {
    SLIDES.forEach((s, i) => {
      document.getElementById(s.id).classList.toggle('active', i === index);
    });
    sceneCounter.textContent = `${index + 1} / ${TOTAL}`;
    slideLabel.textContent   = SLIDES[index].label;
    slideTopic.textContent   = SLIDES[index].topic;
    progressBar.style.width  = ((index + 1) / TOTAL * 100) + '%';
    btnPrev.classList.toggle('disabled', index === 0);
    btnNext.classList.toggle('disabled', index === TOTAL - 1);
  }

  btnPrev.addEventListener('click', () => { if (current > 0) showScene(--current); });
  btnNext.addEventListener('click', () => { if (current < TOTAL - 1) showScene(++current); });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (current < TOTAL - 1) showScene(++current); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { if (current > 0) showScene(--current); }
  });

  showScene(0);
</script>
</body>
</html>
